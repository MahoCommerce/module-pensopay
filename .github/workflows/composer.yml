name: Composer Validate

on:
    push:
        branches: [main]
    pull_request:
    workflow_dispatch:

jobs:
    composer:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

            - name: Validate composer.json
              run: composer validate --strict --no-check-all
